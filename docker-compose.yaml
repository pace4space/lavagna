services:

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lavagna
      MYSQL_USER: sa
      MYSQL_PASSWORD: ""
    # ports:
    #   - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lavagna-network

  lavagna:
    build: .
    # ports:
    #   - "8080:8080"
    networks:
      - proxy-front
      - lavagna-network
    # volumes removed - not needed for simple proxy setup
    env_file:
      - .env
    depends_on:
      - mysql

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - proxy-front
    depends_on:
      - lavagna
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  mysql-data:
  # static-files:

networks:
  lavagna-network:
  proxy-front: