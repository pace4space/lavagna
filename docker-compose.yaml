services:

  mysql:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: lavagna
      MYSQL_USER: sa
      MYSQL_PASSWORD: ""
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - lavagna-network

  lavagna:
    build: .
    networks:
      - proxy-front
      - lavagna-network
    env_file:
      - .env
    depends_on:
      - mysql
    volumes:
      - docs-data:/app/docs-dist

  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
      - "8081:8081"
    networks:
      - proxy-front
    depends_on:
      - lavagna
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./project/src/main/webapp:/usr/share/nginx/html:ro
      - docs-data:/app/docs-dist:ro

volumes:
  mysql-data:
  docs-data:

networks:
  lavagna-network:
  proxy-front: