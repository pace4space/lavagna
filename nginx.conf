server {
    listen 80;

    # 2. General location for all folders
    location ~* ^/(app|app-login|css|favicon|fonts|js|setup|svg|WEB-INF) {
        root /usr/share/nginx/html;
        add_header X-Served-By "nginx";
        expires 30d;
        try_files $uri $uri/ @app;
    }
        location / {
        proxy_pass http://lavagna:8080;
        add_header X-Served-By "Lavagna_root";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
        location @app {
        proxy_pass http://lavagna:8080;
        add_header X-Served-By "Lavagna_app";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# STAMPO Documentation (8081)
server {
    listen 8081;
    root /app/docs-dist;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}